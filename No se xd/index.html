<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Para una falladita ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- FONDO ANIMADO Y BORDE LED --- */
        body {
            background: radial-gradient(circle at center, #1a0033 0%, #05000a 100%);
            background-image: 
                radial-gradient(circle at center, #1a0033 0%, #05000a 100%),
                linear-gradient(135deg, rgba(168, 85, 247, 0.05) 0%, rgba(217, 70, 239, 0.05) 100%);
            background-size: 100% 100%, 200% 200%; 
            animation: moverDegradado 20s ease infinite; 
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Montserrat', sans-serif; 
            
            box-sizing: border-box;
            border: 1px solid rgba(168, 85, 247, 0.3); 
            box-shadow: 
                inset 0 0 15px rgba(168, 85, 247, 0.2), 
                0 0 20px rgba(217, 70, 239, 0.1); 
        }

        @keyframes moverDegradado {
            0% { background-position: 100% 100%, 0% 0%; }
            50% { background-position: 100% 100%, 100% 100%; }
            100% { background-position: 100% 100%, 0% 0%; }
        }

        /* --- CONTENEDOR DE LA LETRA --- */
        #contenedor-principal {
            text-align: center;
            z-index: 10; 
            width: 90%;
            max-width: 800px;
        }

        /* --- DISEÑO DE LA LETRA --- */
        #letras {
            font-size: 2.8rem; 
            font-weight: 800; 
            min-height: 140px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px; 
            text-shadow: 
                0 0 10px #ffffff, 
                0 0 20px rgba(168, 85, 247, 0.8), 
                0 0 35px rgba(217, 70, 239, 0.6), 
                0 0 50px rgba(168, 85, 247, 0.4); 
            transition: opacity 0.4s ease-in-out;
        }

        /* Animación con efecto de luz encendiéndose (Blur) */
        .letra-cambio {
            animation: aparecerCinematico 0.8s ease forwards;
        }

        @keyframes aparecerCinematico {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); filter: blur(8px); }
            50% { opacity: 1; text-shadow: 0 0 60px #d946ef, 0 0 20px #ffffff, 0 0 40px #a855f7; filter: blur(0px); }
            100% { transform: translateY(0) scale(1); filter: blur(0px); }
        }

        /* Mensaje final sorpresa */
        .mensaje-final {
            font-size: 2rem !important;
            text-transform: none !important; 
            font-weight: 600 !important;
            color: #f5d0fe !important; 
        }

        /* --- BOTÓN --- */
        #botonReproducir {
            margin-top: 30px;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(217, 70, 239, 0.1) 100%);
            color: #ffffff;
            border: 1px solid rgba(217, 70, 239, 0.6); 
            padding: 12px 35px; 
            font-size: 1.1rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            border-radius: 50px; 
            cursor: pointer;
            position: relative;
            z-index: 11;
            box-shadow: 0 0 10px rgba(217, 70, 239, 0.4), inset 0 0 8px rgba(217, 70, 239, 0.4);
            transition: all 0.4s ease;
            letter-spacing: 1px;
        }

        #botonReproducir:hover {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.8) 0%, rgba(217, 70, 239, 0.8) 100%);
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.7), inset 0 0 12px rgba(255, 255, 255, 0.5);
            transform: scale(1.03); 
        }

        #botonReproducir:disabled {
            display: none;
        }

        /* --- ELEMENTOS DE FONDO --- */
        .elemento-fondo {
            position: absolute;
            bottom: -100px;
            user-select: none;
            z-index: 1;
            opacity: 0;
            animation: flotar linear infinite;
        }

        .color-m { color: rgba(217, 70, 239, 0.6); text-shadow: 0 0 10px rgba(217, 70, 239, 0.4); }
        .color-v { color: rgba(168, 85, 247, 0.6); text-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }

        @keyframes flotar {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; } 
            80% { opacity: 0.3; }
            100% { transform: translateY(-110vh) scale(0.7) rotate(15deg); opacity: 0; }
        }

        /* ✨ ADAPTACIÓN PARA CELULARES ✨ */
        @media (max-width: 600px) {
            #letras {
                font-size: 1.6rem; 
                min-height: 100px;
            }
            .mensaje-final {
                font-size: 1.5rem !important;
            }
        }
    </style>
</head>
<body>

    <div id="contenedor-principal">
        <div id="letras"> Para una falladita ✨ :3</div>
        
        <button id="botonReproducir">▶ REPRODUCIR</button>
        
        <audio id="miMusica" src="LETRA  Dame Amor  Officialalex425 x Oscar Maydon (Lyric Video).mp3"></audio>
    </div>

    <script>
        const audio = document.getElementById('miMusica');
        const boton = document.getElementById('botonReproducir');
        const contenedorLetras = document.getElementById('letras');
        
        // --- CONFIGURA TUS TIEMPOS AQUÍ (EN SEGUNDOS) ---
        // 0:30 son 30 segundos, 1:08 son 68 segundos
        const tiempoInicio = 30; // Segundo donde empieza (0:30)
        const tiempoFin = 68;    // Segundo donde termina y se detiene (1:08)

        // --- TU LETRA PERSONALIZADA DE AMISTAD ---
        // Estos tiempos ahora están distribuidos entre el segundo 30 y el 68.
        const sincronizacionLetra = [
            { time: 30, text: "Quiero que sepas que eres una linda mujer... ✨" },
            { time: 35, text: "y no me dejes aquí solito 💛" },
            { time: 40, text: "si tú me dejas yo siempre te querré 🦋" },
            { time: 45, text: "te miro a los ojos me tienes loco 🌸" },
            { time: 51, text: "y tus sonrisas se me pegan en la mente🎶" },
            { time: 57, text: "me gusta tu forma, todo y tus traumas💫" },
            { time: 63, text: "Quédate siempre, sin ti qué voy a hacer 💜" }
        ];

        boton.addEventListener('click', () => {
            audio.currentTime = tiempoInicio;
            audio.volume = 1; 
            audio.play();
            boton.disabled = true;
            contenedorLetras.classList.remove('mensaje-final'); 
        });

        audio.addEventListener('timeupdate', () => {
            let tiempoActual = audio.currentTime;

            // Efecto Fade-out (La música baja el volumen poco a poco al final)
            if (tiempoActual >= (tiempoFin - 2) && audio.volume > 0.05) {
                audio.volume -= 0.02; 
            }

            // Cuando la canción llega al tiempoFin (segundo 68)
            if (tiempoActual >= tiempoFin) {
                audio.pause();
                boton.disabled = false;
                boton.innerText = "↻ No te acostumbres a esto... ¡Reproducir de nuevo!";
                
                // Mensaje sorpresa al final
                contenedorLetras.classList.add('mensaje-final');
                actualizarTexto("Pensé en ti cuando escuché esto...<br>💜🦋");
                return;
            }

            // Revisa qué letra debe mostrar según el segundo
            let textoActual = "";
            for (let i = 0; i < sincronizacionLetra.length; i++) {
                if (tiempoActual >= sincronizacionLetra[i].time) {
                    textoActual = sincronizacionLetra[i].text;
                }
            }

            // Cambia el texto en la pantalla con animación
            if (textoActual !== "" && contenedorLetras.innerHTML !== textoActual) {
                actualizarTexto(textoActual);
            }
        });

        function actualizarTexto(nuevoTexto) {
            contenedorLetras.classList.remove('letra-cambio');
            void contenedorLetras.offsetWidth; 
            contenedorLetras.innerHTML = nuevoTexto;
            contenedorLetras.classList.add('letra-cambio');
        }

        // --- CREAR ELEMENTOS DE FONDO ---
        function crearElementosFondo() {
            const body = document.querySelector('body');
            for (let i = 0; i < 45; i++) {
                const elemento = document.createElement('div');
                const simbolos = ['♥', '💖', '✨', '💜', '🦋'];
                elemento.innerText = simbolos[Math.floor(Math.random() * simbolos.length)];
                
                elemento.classList.add('elemento-fondo');
                elemento.classList.add(Math.random() > 0.5 ? 'color-m' : 'color-v');

                elemento.style.left = Math.random() * 100 + 'vw';
                elemento.style.fontSize = Math.random() * 20 + 15 + 'px';
                elemento.style.animationDuration = Math.random() * 15 + 8 + 's'; 
                elemento.style.animationDelay = Math.random() * 8 + 's';

                body.appendChild(elemento);
            }
        }

        crearElementosFondo();
    </script>

</body>
</html>
